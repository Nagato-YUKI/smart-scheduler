services:
  - type: web
    name: smart-scheduler-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT wsgi:app
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DB_TYPE
        value: postgresql
      - key: DATABASE_URL
        fromDatabase:
          name: paike-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://nagato-yuki.github.io

databases:
  - name: paike-db
    plan: free
    region: oregon
    version: "15"
