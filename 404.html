<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能排课系统</title>
  <script>
    // 将当前路径保存到 sessionStorage，然后重定向到 index.html
    sessionStorage.setItem('redirect-path', window.location.pathname);
    window.location.href = '/smart-scheduler/';
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
